profiles:
  standard:
    description: "Default profile for public sites"
    browser_profile: "LITE"
    proxy:
      enabled: false
    rate_limit:
      max_requests_per_minute: 20
      jitter_ms: 0
    retry_policy:
      max_retries: 2
      backoff_seconds: 1

  stealth:
    description: "Anti-detection profile for protected government portals"
    browser_profile: "STEALTH"
    proxy:
      enabled: false
    rate_limit:
      max_requests_per_minute: 5
      jitter_ms: 800
    retry_policy:
      max_retries: 3
      backoff_seconds: 3

  stealth_proxied:
    description: "Maximum evasion with residential proxies"
    browser_profile: "STEALTH"
    proxy:
      enabled: true
      country: "US"
      type: "residential"
    rate_limit:
      max_requests_per_minute: 3
      jitter_ms: 1500
    retry_policy:
      max_retries: 4
      backoff_seconds: 5

  high_security:
    description: "For sites with aggressive bot detection"
    browser_profile: "STEALTH"
    proxy:
      enabled: true
      country: "US"
      type: "residential"
    rate_limit:
      max_requests_per_minute: 2
      jitter_ms: 2000
    retry_policy:
      max_retries: 5
      backoff_seconds: 8

source_profile_mapping:
  us_osha: stealth
  us_fda: standard
  us_sec: standard
  us_dol: standard
  us_epa: standard
